<!DOCTYPE html>
<html>
<head>

    <title>Edit Task</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#F3ECFF;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            margin-bottom:30px;
            color:#20003b;
        }

        input, select{
            width:100%;
            padding:14px;
            margin-top:15px;
            border-radius:12px;
            border:1px solid #ddd;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:25px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#6a00ff,#b000ff);
            color:white;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Edit Task</h1>

    <form method="POST">

        <input
            type="text"
            name="task"
            value="{{ task[1] }}"
            required
        >

        <select name="status">

            <option value="Pending"
            {% if task[2] == 'Pending' %} selected {% endif %}>
                Pending
            </option>

            <option value="Completed"
            {% if task[2] == 'Completed' %} selected {% endif %}>
                Completed
            </option>

        </select>

        <button type="submit">
            Update Task
        </button>

    </form>

</div>

</body>
</html>
