<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Task</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{

            background:
            linear-gradient(
            135deg,
            #EFC3FF,
            #120026
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;
        }

        .task-container{

            width:500px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:30px;

            padding:40px;

            box-shadow:0px 10px 40px rgba(0,0,0,0.3);

            color:white;
        }

        .task-title{

            font-size:40px;
            font-weight:bold;

            margin-bottom:10px;
        }

        .task-subtitle{

            color:#ddd;

            margin-bottom:35px;
        }

        .form-control{

            height:55px;

            border-radius:15px;

            border:none;

            background:rgba(255,255,255,0.12);

            color:white;

            padding-left:20px;

            margin-bottom:25px;
        }

        .form-control::placeholder{

            color:#ddd;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.18);

            color:white;

            box-shadow:none;
        }

        .btn-task{

            width:100%;

            height:55px;

            border:none;

            border-radius:15px;

            font-size:20px;
            font-weight:bold;

            color:white;

            background:
            linear-gradient(
            to right,
            #1B0045,
            #FF9FF3
            );

            transition:0.3s;
        }

        .btn-task:hover{

            transform:scale(1.03);

            opacity:0.9;
        }

        .back-btn{

            margin-top:20px;

            display:block;

            text-align:center;

            color:white;

            text-decoration:none;
        }

        .icon-box{

            width:90px;
            height:90px;

            border-radius:25px;

            background:
            linear-gradient(
            to right,
            #FF7CF0,
            #7A00FF
            );

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:40px;

            margin-bottom:25px;
        }

    </style>

</head>

<body>

    <div class="task-container">

        <div class="icon-box">

            <i class="fa-solid fa-list-check"></i>

        </div>

        <div class="task-title">
            Add New Task
        </div>

        <div class="task-subtitle">
            Organize your work efficiently
        </div>

        <form method="POST">

            <input type="text"
                   name="task"
                   class="form-control"
                   placeholder="Enter your task"
                   required>

            <button class="btn-task">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </form>

        <a href="/tasks" class="back-btn">

            ← Back to Tasks

        </a>

    </div>

</body>

</html>
