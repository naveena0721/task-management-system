<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">
        Task System
    </div>

    <a href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>

    <a href="/tasks">
        <i class="fa-solid fa-list-check"></i>
        Tasks
    </a>

    <a href="/add_task">
        <i class="fa-solid fa-plus"></i>
        Add Task
    </a>

    <a href="/completed">
        <i class="fa-solid fa-circle-check"></i>
        Completed
    </a>

    <a href="/calendar">
        <i class="fa-solid fa-calendar"></i>
        Calendar
    </a>

    <a href="/reports">
        <i class="fa-solid fa-chart-simple"></i>
        Reports
    </a>

    <a href="/profile" class="active">
        <i class="fa-solid fa-user"></i>
        Profile
    </a>

    <a href="/">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>

</div>

<div class="main">

    <div class="card-box">

        <h1 class="page-title">
            Profile Settings
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label>Name</label>

                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ profile[1] }}"
                       required>

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input type="email"
                       name="email"
                       class="form-control"
                       value="{{ profile[2] }}"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="text"
                       name="password"
                       class="form-control"
                       value="{{ profile[3] }}"
                       required>

            </div>

            <div class="mb-3">

                <label>Task Preference</label>

                <input type="text"
                       name="preference"
                       class="form-control"
                       value="{{ profile[4] }}">

            </div>

            <button class="btn btn-primary">

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>
</html>
